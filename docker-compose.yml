services:
  api:
    build:
      context: ./app
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379} 
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    build:
      context: ./nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge
